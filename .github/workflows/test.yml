name: "Test CI"
on:
  pull_request:
  push:
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: "nix build"
        run: nix build . --show-trace

      - name: "nix flake check"
        run: nix flake check --show-trace
